spring:
  application:
    name: orders
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update

springdoc:
  api-docs:
    enabled: true
    path: /api/docs
  swagger-ui:
    enabled: true
    config-url: /api/docs

logging:
  level:
    org:
      springdoc: DEBUG
      springframework:
        web: DEBUG
        security: DEBUG
    com:
      fasterxml:
        jackson: DEBUG

